<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="stylesheet" href="style.css">
    <script src="script.js"></script>
    <title>NewsVerse | Stay Informed, Stay Ahead</title>
</head>

<body>
    <!-- Navbar Section -->
    <nav id="navbar">
        <div id="logo">
            <img src="images/s-logo.png" alt="NewsVerse">
        </div>
        <ul>
            <ll class="item"><a href="#">Home</a></ll>
            <ll class="item"><a href="#">Technology</a></ll>
            <ll class="item"><a href="#">Business</a></ll>
            <ll class="item"><a href="#">Sport</a></ll>
            <ll class="item"><a href="#">Health</a></ll>
            <ll class="item"><a href="#">Entertainment</a></ll>
            <ll class="item"><a href="#">Science</a></ll>
        </ul>
    </nav>

    <!-- Search Section -->
    <section id="search-section" class="news-search">
        <h2 class="h-secondary center">Find the News That Matters to You</h2>
        <h3 class="h-teriary center">Explore breaking news, trending stories, and the latest updates from around the
            world.</h3>
        <form action="/search" method="GET" class="center">
            <input type="search" id="site-search" name="q" placeholder="Search for news, topics, or keywords...">
            <button class="btn" type="submit">Search</button>
        </form>
    </section>

    <!-- Categories Navigation -->
    <section id="news-category-section" class="news-category">
        <span class=" cate center">
            <a href="#">Technology</a>
            <a href="#">Business</a>
            <a href="#">Sports</a>
            <a href="#">Health</a>
            <a href="#">Environament</a>
            <a href="#">Science</a>
        </span>

    </section>

    <!-- News Card Grid -->
    <section id="news-card-grid" class="news-card-section"></section>

    <!-- Footer Section -->
    <section id="footer-section" class="footer"></section>


</body>

</html>
